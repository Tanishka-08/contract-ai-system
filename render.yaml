services:
  # ------------------------------------
  # Backend API Service (FastAPI)
  # ------------------------------------
  - type: web
    name: contract-ai-backend
    plan: free
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You will need to enter this in the Render Dashboard
      - key: DATABASE_URL
        value: sqlite:////app/contracts.db

  # ------------------------------------
  # Frontend App Service (Streamlit)
  # ------------------------------------
  - type: web
    name: contract-ai-frontend
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: contract-ai-backend
          envVarKey: RENDER_EXTERNAL_URL
