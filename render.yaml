services:
  # ------------------------------------
  # Backend API Service (FastAPI)
  # ------------------------------------
  - type: web
    name: contract-ai-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You will need to enter this in the Render Dashboard
      - key: DATABASE_URL
        value: sqlite:////data/contracts.db
    # Create a persistent disk so the SQLite database is not wiped on every deploy
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  # ------------------------------------
  # Frontend App Service (Streamlit)
  # ------------------------------------
  - type: web
    name: contract-ai-frontend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: contract-ai-backend
          envVarKey: RENDER_EXTERNAL_URL
